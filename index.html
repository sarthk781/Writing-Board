<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="EezUVL0biEJZZ7mpiuoZULSgtuQbt0Uj3b7gkL1ntqY" />
<title>Writing Board</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <section class="hero">

<h2>
Free Online Writing Board
</h2>

<p>
Write, draw, sketch and share
your ideas instantly.
</p>

</section>
    <h1>✏️ Writing Board</h1>
    <p>Write • Draw • Share</p>
</header>

<div class="toolbar">

    <input type="color" id="colorPicker" value="#000000">

    <input type="range"
           id="brushSize"
           min="1"
           max="30"
           value="5">

    <button id="pencilBtn">✏️ Pencil</button>
    <button id="eraserBtn">🧽 Eraser</button>
    <button id="rainbowBtn">🌈 Rainbow</button>

    <button id="undoBtn">↩ Undo</button>
    <button id="redoBtn">↪ Redo</button>

    <button id="saveBtn">💾 Save</button>
    <button id="shareBtn">📤 Share</button>

    <button id="darkBtn">🌙 Dark</button>
    <button id="gridBtn"># Grid</button>
    <button id="lineBtn">📓 Lines</button>

    <button id="clearBtn">🗑 Clear</button>

</div>

<div class="ad-box">
    AdSense Banner Placeholder
</div>

<div class="canvas-wrapper">
    <canvas id="canvas"></canvas>
</div>

<footer>
    <a href="about.html">About</a>
    <a href="faq.html">FAQ</a>
    <a href="how-to-use.html">How To Use</a>
    <a href="privacy.html">Privacy</a>
    <a href="contact.html">Contact</a>
    <a href="terms.html">Terms</a>
</footer>

<script src="script.js"></script>

</body>
</html>
